name: Build

on:
  workflow_dispatch:

run-name: Build

jobs:
  rootfs:
    runs-on: ubuntu-24.04-arm
    name: Build rootfs
    strategy:
        matrix:
          flavor:
            - server
          suite:
            - noble
    steps:
      - name: Get more disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get purge needrestart -y && sudo apt-get upgrade -y
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu bison \
          qemu-user-static qemu-system-arm qemu-efi-aarch64 u-boot-tools binfmt-support \
          debootstrap flex libssl-dev bc rsync kmod cpio xz-utils fakeroot parted \
          udev dosfstools uuid-runtime git-lfs device-tree-compiler python3 \
          python-is-python3 fdisk bc debhelper python3-pyelftools python3-setuptools \
          python3-pkg-resources swig libfdt-dev libpython3-dev dctrl-tools

      # Cache live-build's downloaded packages / bootstrap so re-runs skip the
      # re-download. Rolling key (per run) + restore-keys reuses the newest.
      # Purely an accelerator: a miss just re-downloads.
      - name: Cache live-build downloads
        uses: actions/cache@v4
        with:
          path: build/live-build/cache
          key: lb-cache-${{ matrix.suite }}-${{ matrix.flavor }}-${{ github.run_id }}
          restore-keys: |
            lb-cache-${{ matrix.suite }}-${{ matrix.flavor }}-

      - name: Build
        shell: bash
        run: sudo ./build.sh --suite=${{ matrix.suite }} --flavor=${{ matrix.flavor }} --rootfs-only

      - name: Upload
        uses: actions/upload-artifact@v4.3.3
        with:
            name: ubuntu-24.04-preinstalled-${{ matrix.flavor }}-arm64-rootfs
            path: ./build/ubuntu-24.04-preinstalled-${{ matrix.flavor }}-arm64.rootfs.tar.xz
            if-no-files-found: error

  kernel:
    runs-on: ubuntu-24.04-arm
    name: Build kernel
    strategy:
        matrix:
          suite:
            - noble
    steps:
      - name: Get more disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get purge needrestart -y && sudo apt-get upgrade -y
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu bison \
          qemu-user-static qemu-system-arm qemu-efi-aarch64 u-boot-tools binfmt-support \
          debootstrap flex libssl-dev bc rsync kmod cpio xz-utils fakeroot parted \
          udev dosfstools uuid-runtime git-lfs device-tree-compiler python3 \
          python-is-python3 fdisk bc debhelper python3-pyelftools python3-setuptools \
          python3-pkg-resources swig libfdt-dev libpython3-dev

      # The kernel is pinned to a branch; key the cache on its exact HEAD
      # commit so a hit always corresponds to identical source (no staleness).
      - name: Resolve kernel commit
        id: kver
        shell: bash
        run: |
          source config/suites/${{ matrix.suite }}.sh
          echo "sha=$(git ls-remote "$KERNEL_REPO" "$KERNEL_BRANCH" | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Cache kernel packages
        id: kcache
        uses: actions/cache@v4
        with:
          path: build/linux-*.deb
          key: kernel-${{ matrix.suite }}-${{ steps.kver.outputs.sha }}

      - name: Build
        if: steps.kcache.outputs.cache-hit != 'true'
        shell: bash
        run: sudo ./build.sh --suite=${{ matrix.suite }} --kernel-only

      - name: Upload
        uses: actions/upload-artifact@v4.3.3
        with:
            name: linux-rockchip-6.1
            path: ./build/linux-*.deb
            if-no-files-found: error

  build:
    runs-on: ubuntu-24.04-arm
    needs: [rootfs, kernel]
    name: Build image

    strategy:
      matrix:
        board:
          - rock-5b-plus
        flavor:
          - server
        suite:
          - noble

    steps:
      - name: Get more disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout LFS
        shell: bash
        run: git lfs fetch && git lfs checkout

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get purge needrestart -y && sudo apt-get upgrade -y
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu bison \
          qemu-user-static qemu-system-arm qemu-efi-aarch64 u-boot-tools binfmt-support \
          debootstrap flex libssl-dev bc rsync kmod cpio xz-utils fakeroot parted \
          udev dosfstools uuid-runtime git-lfs device-tree-compiler python3 \
          python-is-python3 fdisk bc debhelper python3-pyelftools python3-setuptools \
          python3-pkg-resources swig libfdt-dev libpython3-dev dctrl-tools

      # U-Boot is pinned to an exact commit in debian/upstream; key on it so a
      # hit always matches the source. build.sh skips the u-boot build when the
      # .deb is already present in build/.
      - name: Resolve u-boot commit
        id: uver
        shell: bash
        run: |
          source packages/u-boot-radxa-rk3588/debian/upstream
          echo "sha=$COMMIT" >> "$GITHUB_OUTPUT"

      - name: Cache u-boot package
        id: ucache
        uses: actions/cache@v4
        with:
          path: build/u-boot-${{ matrix.board }}_*.deb
          key: uboot-${{ matrix.board }}-${{ steps.uver.outputs.sha }}

      - name: Checkout rootfs
        uses: actions/download-artifact@v4.1.2
        with:
            name: ubuntu-24.04-preinstalled-${{ matrix.flavor }}-arm64-rootfs
            path: ./build/

      - name: Checkout kernel
        uses: actions/download-artifact@v4.1.2
        with:
            name: linux-rockchip-6.1
            path: ./build/

      - name: Build
        shell: bash
        run: sudo ./build.sh --board=${{ matrix.board }} --suite=${{ matrix.suite }} --flavor=${{ matrix.flavor }}

      - name: Upload
        uses: actions/upload-artifact@v4.3.3
        with:
          name: ubuntu-24.04-preinstalled-${{ matrix.flavor }}-arm64-${{ matrix.board }}
          path: ./images/ubuntu-*-preinstalled-${{ matrix.flavor }}-arm64-${{ matrix.board }}.*
          if-no-files-found: error
